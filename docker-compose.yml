services:
  app:
    env_file:
      - config/.env
    build: .
    image: url_shortener
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: ${MONGO_URI}
      PORT: 3000
    volumes:
      - ./logs:/app/logs
    depends_on:
      - db
      - redis
  db:
    image: mongo:7
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

volumes:
  mongo_data:
    